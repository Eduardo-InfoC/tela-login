<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="pesquisa.png" type="image/x-icon">
</head>
<body>
    <div class="login">
        <div class="title">
            <h1>Faça login na sua conta</h1>
        </div>
        <div class="email">
            <label for="email">E-mail: </label>
            <input type="email" name="email" id="email" placeholder="exemplo123@email.com.br">
        </div>
        <div class="senha">
            <label for="password">Senha: </label>
            <input type="password" name="password" id="password" placeholder="Senha#123">
        </div>
        <div class="buttons">
            <input type="submit" value="Enviar" class="botao">
            <button class="botao cadastro">Não tem uma conta? <spam>Cadastre-se</spam></button>
        </div>
    </div>
</body>
</html>
